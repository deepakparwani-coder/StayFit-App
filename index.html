<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover, maximum-scale=1.0, user-scalable=no" />
  <meta name="theme-color" content="#0a0a0a" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <meta name="apple-mobile-web-app-title" content="Stay Fit" />
  <link rel="manifest" href="manifest.json" />
  <link rel="apple-touch-icon" href="apple-touch-icon.png" />
  <link rel="icon" type="image/png" sizes="32x32" href="favicon-32.png" />
  <link rel="icon" type="image/png" sizes="192x192" href="icon-192.png" />
  <title>Stay Fit — Personal Training</title>

  <!-- Fonts -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,400;9..144,600;9..144,800&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">

  <!-- Tailwind -->
  <script src="https://cdn.tailwindcss.com"></script>

  <!-- React + ReactDOM -->
  <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
  <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>

  <!-- Babel for JSX (development; can be removed if precompiled) -->
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

  <!-- Lucide icons -->
  <script src="https://unpkg.com/lucide@latest/dist/umd/lucide.min.js"></script>

  <style>
    * { -webkit-tap-highlight-color: transparent; }
    html, body { font-family: 'Inter', system-ui, sans-serif; background: #fafaf9; overscroll-behavior: none; }
    body { padding-top: env(safe-area-inset-top); padding-bottom: env(safe-area-inset-bottom); }
    .display-font { font-family: 'Fraunces', serif; font-optical-sizing: auto; }
    .brand-font { font-family: 'Fraunces', serif; font-weight: 800; letter-spacing: 0.04em; }
    .pulse-dot { animation: pulse 2s ease-in-out infinite; }
    @keyframes pulse { 0%, 100% { opacity: 1; } 50% { opacity: 0.4; } }
    .slide-up { animation: slideUp 0.3s ease-out; }
    @keyframes slideUp { from { transform: translateY(100%); } to { transform: translateY(0); } }
    .fade-in { animation: fadeIn 0.4s ease-out; }
    @keyframes fadeIn { from { opacity: 0; transform: translateY(8px); } to { opacity: 1; transform: translateY(0); } }
    .float-in { animation: floatIn 0.6s ease-out; }
    @keyframes floatIn { from { opacity: 0; transform: translateY(20px) scale(0.95); } to { opacity: 1; transform: translateY(0) scale(1); } }
    .form-input { width: 100%; background: white; border: 1px solid #e7e5e4; border-radius: 12px; padding: 12px 14px; font-size: 15px; color: #0a0a0a; outline: none; transition: border-color 0.15s; font-family: 'Inter', sans-serif; }
    .form-input:focus { border-color: #0a0a0a; }
    .spinner { width: 24px; height: 24px; border: 2.5px solid #e7e5e4; border-top-color: #0a0a0a; border-radius: 50%; animation: spin 0.8s linear infinite; }
    @keyframes spin { to { transform: rotate(360deg); } }
    @supports (-webkit-touch-callout: none) { input, select, textarea { font-size: 16px !important; } }
    .grain { position: relative; }
    .grain::after { content: ''; position: absolute; inset: 0; pointer-events: none; opacity: 0.06; background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)'/%3E%3C/svg%3E"); mix-blend-mode: overlay; }
    .brand-stripe { background: linear-gradient(180deg, #fbbf24 0%, #f59e0b 100%); }
    .glow-amber { box-shadow: 0 0 40px -10px rgba(251, 191, 36, 0.4); }
  </style>
</head>
<body>
  <div id="root"></div>

  <!-- Firebase -->
  <script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
    import { getFirestore, collection, doc, setDoc, deleteDoc, onSnapshot, query, where } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";
    import { getAuth, signInAnonymously, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-auth.js";

    // ⚠️ REPLACE THESE WITH YOUR OWN FIREBASE PROJECT CONFIG
    const firebaseConfig = {
      apiKey: "AIzaSyDWSjn_sKN7sRiMUb5gc7g1hfi8qksk5xw",
      authDomain: "stayfit-app-95f0c.firebaseapp.com",
      projectId: "stayfit-app-95f0c",
      storageBucket: "stayfit-app-95f0c.firebasestorage.app",
      messagingSenderId: "503264118557",
      appId: "1:503264118557:web:94ed475ac770fc1aef03f4"
    };

    // ⚠️ TRAINER PIN — change this to whatever you want before deploying.
    // Only people who know this PIN can access the trainer view.
    // Members never need to enter it; they only enter their phone number.
    window.TRAINER_PIN = "8850";

    const app = initializeApp(firebaseConfig);
    const db = getFirestore(app);
    const auth = getAuth(app);

    // Expose to global for the React app to use
    window.firebaseDB = db;
    window.firebaseAuth = auth;
    window.firebaseHelpers = {
      collection, doc, setDoc, deleteDoc, onSnapshot, query, where,
      signInAnonymously, onAuthStateChanged
    };

    // Sign in anonymously so Firestore rules can require auth
    signInAnonymously(auth).catch((err) => {
      console.error('Auth error:', err);
    });

    // Service worker for offline
    if ('serviceWorker' in navigator) {
      window.addEventListener('load', () => {
        navigator.serviceWorker.register('sw.js').catch(() => {});
      });
    }
  </script>

  <script type="text/babel" data-type="module">
    const { useState, useEffect } = React;

    // Wait for Firebase to initialize
    const waitForFirebase = () => new Promise((resolve) => {
      const check = () => {
        if (window.firebaseDB && window.firebaseHelpers) resolve();
        else setTimeout(check, 50);
      };
      check();
    });

    // ===== Storage abstraction (Firestore) =====
    // Trainer ID is the gym key — all members/sessions/payments belong to this trainer.
    // We use a single shared trainer ID for simplicity (one trainer per deployment).
    // For multi-trainer, you'd derive this from auth user.
    const TRAINER_ID = 'default_trainer';

    const fb = () => window.firebaseHelpers;
    const db = () => window.firebaseDB;

    const Storage = {
      onCollection(name, callback) {
        const { collection, onSnapshot, query, where } = fb();
        const q = query(collection(db(), name), where('trainerId', '==', TRAINER_ID));
        return onSnapshot(q, (snap) => {
          const items = [];
          snap.forEach((d) => items.push({ id: d.id, ...d.data() }));
          callback(items);
        }, (err) => console.error(`Listen error on ${name}:`, err));
      },
      async save(name, item) {
        const { doc, setDoc } = fb();
        const id = item.id || `${name}_${Date.now()}_${Math.random().toString(36).slice(2,7)}`;
        const data = { ...item, id, trainerId: TRAINER_ID };
        await setDoc(doc(db(), name, id), data);
        return data;
      },
      async delete(name, id) {
        const { doc, deleteDoc } = fb();
        await deleteDoc(doc(db(), name, id));
      },
    };

    // ===== Date / Schedule helpers =====
    // Day of week: 0=Sun, 1=Mon, 2=Tue, 3=Wed, 4=Thu, 5=Fri, 6=Sat
    const DAYS = [
      { v: 1, label: 'Mon' },
      { v: 2, label: 'Tue' },
      { v: 3, label: 'Wed' },
      { v: 4, label: 'Thu' },
      { v: 5, label: 'Fri' },
      { v: 6, label: 'Sat' },
    ]; // Sunday excluded (gym closed)

    function toISO(d) {
      const y = d.getFullYear();
      const m = String(d.getMonth() + 1).padStart(2, '0');
      const day = String(d.getDate()).padStart(2, '0');
      return `${y}-${m}-${day}`;
    }

    // Generate scheduled session dates from startDate to endDate (inclusive),
    // for the given days-of-week array. Skips Sundays automatically.
    // If endDate is empty, generates 8 weeks ahead as fallback.
    function generateRecurringSessions({ memberId, scheduleDays, scheduleTime, location, startDate, endDate }) {
      if (!scheduleDays || scheduleDays.length === 0) return [];
      const start = new Date(startDate || new Date().toISOString().split('T')[0]);
      let end;
      if (endDate) {
        end = new Date(endDate);
      } else {
        end = new Date(start);
        end.setDate(end.getDate() + 56); // 8 weeks fallback
      }
      if (end < start) return [];
      const today = new Date(); today.setHours(0,0,0,0);
      const sessions = [];
      const cur = new Date(start);
      cur.setHours(0,0,0,0);
      while (cur <= end) {
        const dow = cur.getDay();
        if (dow !== 0 && scheduleDays.includes(dow)) {
          // Only auto-create future or today; skip historical
          if (cur >= today) {
            sessions.push({
              memberId,
              date: toISO(cur),
              time: scheduleTime || '07:00',
              location: location || '',
              notes: '',
              status: 'scheduled',
              recurring: true,
            });
          }
        }
        cur.setDate(cur.getDate() + 1);
      }
      return sessions;
    }

    // ===== Icons =====
    const Icon = ({ name, size = 20, className = '', strokeWidth = 2 }) => {
      const ref = React.useRef(null);
      React.useEffect(() => {
        if (ref.current && window.lucide) {
          ref.current.innerHTML = '';
          const svg = window.lucide.createElement(window.lucide.icons[name] || window.lucide.icons['Circle']);
          svg.setAttribute('width', size);
          svg.setAttribute('height', size);
          svg.setAttribute('stroke-width', strokeWidth);
          ref.current.appendChild(svg);
        }
      }, [name, size, strokeWidth]);
      return <span ref={ref} className={`inline-flex ${className}`} style={{ width: size, height: size }} />;
    };

    // ===== Main App =====
    function App() {
      const [authReady, setAuthReady] = useState(false);
      const [mode, setMode] = useState(null);
      const [memberPhone, setMemberPhone] = useState('');
      const [members, setMembers] = useState([]);
      const [sessions, setSessions] = useState([]);
      const [payments, setPayments] = useState([]);
      const [measurements, setMeasurements] = useState([]);
      const [loading, setLoading] = useState(true);

      useEffect(() => {
        const { onAuthStateChanged } = fb();
        const unsub = onAuthStateChanged(window.firebaseAuth, (user) => {
          if (user) setAuthReady(true);
        });
        return unsub;
      }, []);

      useEffect(() => {
        if (!authReady) return;
        const u1 = Storage.onCollection('members', setMembers);
        const u2 = Storage.onCollection('sessions', setSessions);
        const u3 = Storage.onCollection('payments', setPayments);
        const u4 = Storage.onCollection('measurements', setMeasurements);
        try {
          const saved = JSON.parse(localStorage.getItem('app:mode') || 'null');
          if (saved?.mode === 'trainer') setMode('trainer');
          else if (saved?.mode === 'member' && saved.phone) { setMode('member'); setMemberPhone(saved.phone); }
        } catch (e) {}
        setLoading(false);
        return () => { u1(); u2(); u3(); u4(); };
      }, [authReady]);

      const persistMode = (m, phone = '') => {
        try { localStorage.setItem('app:mode', JSON.stringify({ mode: m, phone })); } catch (e) {}
      };

      const enterTrainer = () => { setMode('trainer'); persistMode('trainer'); };
      const enterMember = (phone) => { setMode('member'); setMemberPhone(phone); persistMode('member', phone); };
      const exitMode = () => { setMode(null); setMemberPhone(''); persistMode(''); };

      if (!authReady || loading) {
        return (
          <div className="min-h-screen flex flex-col items-center justify-center bg-neutral-950 relative overflow-hidden">
            <div className="absolute inset-0 bg-gradient-to-b from-neutral-900 to-black" />
            <div className="absolute top-1/2 left-1/2 -translate-x-1/2 -translate-y-1/2 w-96 h-96 bg-amber-500/10 rounded-full blur-3xl" />
            <div className="relative flex flex-col items-center">
              <img src="logo-white.png" alt="Stay Fit" className="w-40 h-auto mb-8 opacity-90" />
              <div className="spinner mb-4" style={{ borderTopColor: '#fbbf24' }} />
              <div className="text-amber-400/70 font-light tracking-[0.3em] text-xs">CONNECTING</div>
            </div>
          </div>
        );
      }

      if (mode === null) return <RoleSelect members={members} onTrainer={enterTrainer} onMember={enterMember} />;
      if (mode === 'trainer') {
        return <TrainerApp members={members} sessions={sessions} payments={payments} measurements={measurements} onExit={exitMode} />;
      }
      return <MemberApp phone={memberPhone} members={members} sessions={sessions} payments={payments} measurements={measurements} onExit={exitMode} />;
    }

    // ===== Role Select =====
    function RoleSelect({ members, onTrainer, onMember }) {
      const [showMemberLogin, setShowMemberLogin] = useState(false);
      const [showTrainerLogin, setShowTrainerLogin] = useState(false);
      const [pin, setPin] = useState('');
      const [pinError, setPinError] = useState('');
      const [phone, setPhone] = useState('');
      const [error, setError] = useState('');

      const handleMemberLogin = () => {
        const cleaned = phone.replace(/[^0-9]/g, '');
        if (cleaned.length < 6) { setError('Enter a valid phone number'); return; }
        const last10 = cleaned.slice(-10);
        const member = members.find((m) => (m.phone || '').replace(/[^0-9]/g, '').endsWith(last10));
        if (!member) { setError('No member found. Ask your trainer to add you.'); return; }
        onMember(member.phone);
      };

      const handleTrainerLogin = () => {
        if (pin === window.TRAINER_PIN) {
          setShowTrainerLogin(false);
          setPin('');
          setPinError('');
          onTrainer();
        } else {
          setPinError('Incorrect PIN');
          setPin('');
        }
      };

      return (
        <div className="min-h-screen bg-neutral-950 flex flex-col text-white relative overflow-hidden">
          {/* Background atmosphere */}
          <div className="absolute inset-0 bg-gradient-to-b from-neutral-900 via-neutral-950 to-black" />
          <div className="absolute top-0 right-0 w-96 h-96 bg-amber-500/10 rounded-full blur-3xl" />
          <div className="absolute bottom-0 left-0 w-96 h-96 bg-amber-400/5 rounded-full blur-3xl" />
          
          <div className="relative flex-1 flex flex-col items-center justify-center px-6 fade-in">
            {/* Logo */}
            <div className="mb-8 float-in">
              <img src="logo-white.png" alt="Stay Fit" className="w-56 h-auto" />
            </div>
            
            <div className="text-center">
              <div className="inline-flex items-center gap-2 text-[10px] uppercase tracking-[0.35em] text-amber-400 font-bold mb-3">
                <span className="w-6 h-px bg-amber-400" /> Personal Training <span className="w-6 h-px bg-amber-400" />
              </div>
              <h1 className="display-font text-3xl font-semibold text-white leading-tight">
                Every rep counts.<br/><span className="text-amber-400">Every member matters.</span>
              </h1>
            </div>

            <div className="w-full max-w-sm mt-10 space-y-3">
              <button onClick={() => { setShowTrainerLogin(true); setPin(''); setPinError(''); }} className="w-full bg-amber-400 text-neutral-900 rounded-2xl p-5 flex items-center justify-between active:scale-[0.98] transition glow-amber">
                <div className="text-left">
                  <div className="text-[10px] uppercase tracking-[0.2em] text-neutral-800 font-bold">I'm the</div>
                  <div className="display-font text-2xl font-semibold mt-0.5">Trainer</div>
                  <div className="text-xs text-neutral-700 mt-0.5">Manage members, sessions & payments</div>
                </div>
                <Icon name="ChevronRight" size={24} className="text-neutral-900" />
              </button>

              <button onClick={() => setShowMemberLogin(true)} className="w-full bg-neutral-900 border border-neutral-800 rounded-2xl p-5 flex items-center justify-between active:scale-[0.98] transition">
                <div className="text-left">
                  <div className="text-[10px] uppercase tracking-[0.2em] text-amber-400 font-bold">I'm a</div>
                  <div className="display-font text-2xl font-semibold text-white mt-0.5">Member</div>
                  <div className="text-xs text-neutral-400 mt-0.5">View my progress & schedule</div>
                </div>
                <Icon name="ChevronRight" size={24} className="text-neutral-500" />
              </button>
            </div>
            
            <div className="mt-12 text-[10px] uppercase tracking-[0.3em] text-neutral-600 font-semibold">
              Train · Track · Transform
            </div>
          </div>

          {showMemberLogin && (
            <div className="fixed inset-0 bg-black/60 z-50 flex items-end" onClick={() => setShowMemberLogin(false)}>
              <div className="bg-stone-50 rounded-t-3xl w-full slide-up" onClick={(e) => e.stopPropagation()}>
                <div className="px-5 pt-5 pb-3 flex items-center justify-between border-b border-stone-200">
                  <h2 className="display-font text-xl font-semibold text-neutral-900">Member Login</h2>
                  <button onClick={() => setShowMemberLogin(false)} className="w-8 h-8 rounded-full bg-stone-200 flex items-center justify-center"><Icon name="X" size={16} /></button>
                </div>
                <div className="p-5 space-y-4">
                  <div>
                    <label className="block text-xs font-semibold uppercase tracking-wider text-stone-500 mb-1.5">Phone number</label>
                    <input type="tel" inputMode="numeric" value={phone}
                      onChange={(e) => { setPhone(e.target.value); setError(''); }}
                      onKeyDown={(e) => e.key === 'Enter' && handleMemberLogin()}
                      className="form-input" placeholder="Enter your phone number" autoFocus />
                    {error && <div className="text-xs text-red-600 mt-2 flex items-center gap-1"><Icon name="AlertCircle" size={12} /> {error}</div>}
                  </div>
                  <button onClick={handleMemberLogin} className="w-full bg-neutral-900 text-white rounded-2xl py-4 font-semibold active:scale-[0.98] transition">Continue</button>
                  <p className="text-xs text-stone-500 text-center">Your trainer must add you first using this phone number.</p>
                </div>
              </div>
            </div>
          )}

          {showTrainerLogin && (
            <div className="fixed inset-0 bg-black/60 z-50 flex items-end" onClick={() => { setShowTrainerLogin(false); setPin(''); setPinError(''); }}>
              <div className="bg-stone-50 rounded-t-3xl w-full slide-up" onClick={(e) => e.stopPropagation()}>
                <div className="px-5 pt-5 pb-3 flex items-center justify-between border-b border-stone-200">
                  <h2 className="display-font text-xl font-semibold text-neutral-900">Trainer Access</h2>
                  <button onClick={() => { setShowTrainerLogin(false); setPin(''); setPinError(''); }} className="w-8 h-8 rounded-full bg-stone-200 flex items-center justify-center"><Icon name="X" size={16} /></button>
                </div>
                <div className="p-5 space-y-4">
                  <div className="flex items-center gap-2 text-stone-600">
                    <Icon name="Lock" size={14} />
                    <p className="text-xs">Enter your PIN to access the trainer view</p>
                  </div>
                  <div>
                    <label className="block text-xs font-semibold uppercase tracking-wider text-stone-500 mb-1.5">PIN</label>
                    <input type="password" inputMode="numeric" value={pin}
                      onChange={(e) => { setPin(e.target.value); setPinError(''); }}
                      onKeyDown={(e) => e.key === 'Enter' && handleTrainerLogin()}
                      className="form-input text-center tracking-[0.5em] text-lg" placeholder="••••" autoFocus maxLength={20} />
                    {pinError && <div className="text-xs text-red-600 mt-2 flex items-center gap-1"><Icon name="AlertCircle" size={12} /> {pinError}</div>}
                  </div>
                  <button onClick={handleTrainerLogin} className="w-full bg-amber-400 text-neutral-900 rounded-2xl py-4 font-semibold active:scale-[0.98] transition">Unlock</button>
                </div>
              </div>
            </div>
          )}
        </div>
      );
    }

    // ===== Member App =====
    function MemberApp({ phone, members, sessions, payments, measurements, onExit }) {
      const last10 = phone.replace(/[^0-9]/g, '').slice(-10);
      const member = members.find((m) => (m.phone || '').replace(/[^0-9]/g, '').endsWith(last10));

      if (!member) {
        return (
          <div className="min-h-screen bg-stone-50 flex flex-col items-center justify-center p-6">
            <Icon name="AlertCircle" size={40} className="text-amber-500 mb-3" />
            <div className="display-font text-xl text-neutral-900">Account not found</div>
            <div className="text-sm text-stone-500 mt-1 text-center">Your trainer may have removed this number.</div>
            <button onClick={onExit} className="mt-6 px-6 py-3 bg-neutral-950 text-white rounded-full font-semibold">Back to start</button>
          </div>
        );
      }

      const today = new Date().toISOString().split('T')[0];
      const mySessions = sessions.filter((s) => s.memberId === member.id);
      const myPayments = payments.filter((p) => p.memberId === member.id);
      const myMeasurements = [...(measurements || []).filter((m) => m.memberId === member.id)]
        .sort((a, b) => (b.date || '').localeCompare(a.date || ''));
      const completedSessions = mySessions.filter((s) => s.status === 'completed');
      const billableNoShows = mySessions.filter((s) => s.status === 'no_show' && s.billable).length;
      const pastSessions = Number(member.pastSessions || 0);
      const billableSessions = pastSessions + completedSessions.length + billableNoShows;
      const upcomingSessions = mySessions
        .filter((s) => s.date >= today && s.status !== 'cancelled' && s.status !== 'completed' && s.status !== 'no_show')
        .sort((a, b) => `${a.date} ${a.time}`.localeCompare(`${b.date} ${b.time}`));
      const totalPaid = myPayments.reduce((sum, p) => sum + Number(p.amount), 0);

      const isPerSession = member.billingMode === 'per_session';
      const sessionRate = Number(member.sessionRate || 0);
      const packageAmount = Number(member.packageAmount || 0);
      const totalCharged = isPerSession ? sessionRate * billableSessions : packageAmount;
      const due = totalCharged - totalPaid;
      const sessionsTotal = Number(member.sessionsTotal || 0);
      const totalForProgress = billableSessions; // count past + current
      const progress = sessionsTotal > 0 ? Math.min(100, (totalForProgress / sessionsTotal) * 100) : 0;

      const latestMeasurement = myMeasurements[0];
      const previousMeasurement = myMeasurements[1];
      const weightDelta = latestMeasurement && previousMeasurement
        ? Number(latestMeasurement.weight) - Number(previousMeasurement.weight)
        : null;

      const completedDates = [...new Set(completedSessions.map((s) => s.date))].sort().reverse();
      let streak = 0;
      for (let i = 0; i < completedDates.length; i++) {
        const d = new Date(completedDates[i]);
        const expected = new Date(); expected.setDate(expected.getDate() - i);
        const diff = Math.abs(d - expected) / (1000 * 60 * 60 * 24);
        if (diff < 7) streak++; else break;
      }

      return (
        <div className="min-h-screen bg-stone-50 pb-12">
          <header className="px-5 pt-6 pb-10 bg-neutral-950 text-white rounded-b-[2rem] relative overflow-hidden">
            <div className="absolute -top-10 -right-10 w-48 h-48 bg-amber-500/15 rounded-full blur-3xl" />
            <div className="absolute -bottom-20 -left-10 w-48 h-48 bg-amber-400/5 rounded-full blur-3xl" />
            <div className="relative">
              <div className="flex items-center justify-between mb-6">
                <button onClick={onExit} className="flex items-center gap-1 text-xs text-neutral-400 font-medium active:text-white">
                  <Icon name="LogOut" size={14} /> Switch
                </button>
                <div className="flex items-center gap-2">
                  <img src="logo-white.png" alt="Stay Fit" className="h-5 w-auto opacity-90" />
                  <div className="text-[10px] uppercase tracking-[0.25em] text-amber-400 font-bold">Member</div>
                </div>
              </div>
              <div className="flex items-center gap-3">
                <div className="w-14 h-14 rounded-2xl bg-amber-400 flex items-center justify-center text-neutral-900 font-bold text-xl display-font flex-shrink-0 glow-amber">
                  {member.name?.[0]?.toUpperCase() || '?'}
                </div>
                <div className="flex-1 min-w-0">
                  <div className="text-xs text-neutral-400">Welcome back,</div>
                  <div className="display-font text-2xl font-semibold truncate text-white">{member.name}</div>
                </div>
              </div>
            </div>
          </header>

          <main className="px-5 -mt-5 space-y-4">
            <div className="bg-white rounded-3xl p-5 border border-stone-200 shadow-sm fade-in">
              <div className="flex items-center justify-between mb-3">
                <div className="text-xs uppercase tracking-wider text-stone-500 font-semibold">Your Progress</div>
                <div className="flex items-center gap-1 text-xs font-semibold text-amber-700">
                  <Icon name="Flame" size={14} /> {streak} streak
                </div>
              </div>
              <div className="flex items-baseline gap-2">
                <div className="display-font text-6xl font-semibold text-neutral-900 leading-none">{billableSessions}</div>
                {sessionsTotal > 0 && <div className="text-stone-500 text-lg">/ {sessionsTotal}</div>}
              </div>
              <div className="text-xs text-stone-500 mt-1">
                sessions completed
                {pastSessions > 0 && <span className="text-amber-700"> · includes {pastSessions} prior</span>}
              </div>
              {sessionsTotal > 0 && (
                <>
                  <div className="mt-4 h-2 bg-stone-100 rounded-full overflow-hidden">
                    <div className="h-full bg-gradient-to-r from-amber-400 to-amber-500 rounded-full transition-all duration-700" style={{ width: `${progress}%` }} />
                  </div>
                  <div className="flex justify-between mt-1.5 text-[10px] text-stone-500">
                    <span>{Math.round(progress)}% done</span>
                    <span>{Math.max(0, sessionsTotal - billableSessions)} remaining</span>
                  </div>
                </>
              )}
            </div>

            <div className="grid grid-cols-3 gap-2">
              <StatTile iconName="Check" value={billableSessions} label="Completed" tone="emerald" />
              <StatTile iconName="Calendar" value={upcomingSessions.length} label="Upcoming" tone="stone" />
              <StatTile iconName="Award" value={mySessions.length} label="Scheduled" tone="amber" />
            </div>

            <div className="bg-white rounded-2xl p-5 border border-stone-200">
              <div className="text-xs uppercase tracking-wider text-stone-500 font-semibold mb-3">Your Package</div>
              <div className="flex items-center justify-between">
                <div>
                  <div className="display-font text-xl font-semibold text-neutral-900">{isPerSession ? 'Per Session' : member.packageType}</div>
                  {member.location && <div className="text-xs text-stone-500 mt-0.5 flex items-center gap-1"><Icon name="MapPin" size={11} /> {member.location}</div>}
                </div>
                <div className="text-right">
                  {isPerSession ? (
                    <>
                      <div className="display-font text-xl font-semibold text-neutral-900">₹{sessionRate.toLocaleString('en-IN')}</div>
                      <div className="text-[10px] text-stone-500 uppercase tracking-wider">per session</div>
                    </>
                  ) : (
                    <>
                      <div className="display-font text-xl font-semibold text-neutral-900">₹{packageAmount.toLocaleString('en-IN')}</div>
                      <div className="text-[10px] text-stone-500 uppercase tracking-wider">total</div>
                    </>
                  )}
                </div>
              </div>
              {member.packageStart && member.packageEnd && (
                <div className="mt-4 pt-4 border-t border-stone-100 flex justify-between text-xs">
                  <div><div className="text-stone-500">Started</div><div className="font-semibold text-neutral-900 mt-0.5">{new Date(member.packageStart).toLocaleDateString('en-IN', { day: 'numeric', month: 'short', year: 'numeric' })}</div></div>
                  <div className="text-right"><div className="text-stone-500">{isPerSession ? 'Until' : 'Ends'}</div><div className="font-semibold text-neutral-900 mt-0.5">{new Date(member.packageEnd).toLocaleDateString('en-IN', { day: 'numeric', month: 'short', year: 'numeric' })}</div></div>
                </div>
              )}
            </div>

            <div className={`rounded-2xl p-5 border ${due > 0 ? 'bg-gradient-to-br from-amber-50 to-orange-50 border-amber-200' : 'bg-emerald-50 border-emerald-100'}`}>
              <div className="flex items-center justify-between">
                <div>
                  <div className="text-xs uppercase tracking-wider font-semibold text-stone-600">Payment Status</div>
                  <div className={`display-font text-2xl font-semibold mt-1 ${due > 0 ? 'text-amber-900' : 'text-emerald-900'}`}>
                    {due > 0 ? `₹${due.toLocaleString('en-IN')} due` : due < 0 ? `₹${Math.abs(due).toLocaleString('en-IN')} credit` : 'All cleared'}
                  </div>
                  <div className="text-xs text-stone-600 mt-0.5">
                    {isPerSession
                      ? `Paid ₹${totalPaid.toLocaleString('en-IN')} of ₹${totalCharged.toLocaleString('en-IN')} (${billableSessions} × ₹${sessionRate})`
                      : `Paid ₹${totalPaid.toLocaleString('en-IN')} of ₹${packageAmount.toLocaleString('en-IN')}`}
                  </div>
                </div>
                <Icon name={due === 0 ? "Check" : "AlertCircle"} size={32} className={due === 0 ? "text-emerald-600" : "text-amber-600"} />
              </div>
              <div className="mt-3 h-1.5 bg-white/60 rounded-full overflow-hidden">
                <div className={`h-full rounded-full ${due > 0 ? 'bg-amber-500' : 'bg-emerald-500'}`} style={{ width: `${Math.min(100, (totalPaid / Math.max(1, totalCharged)) * 100)}%` }} />
              </div>
            </div>

            {/* Body measurements (read-only for member) */}
            {latestMeasurement && (
              <div className="bg-gradient-to-br from-neutral-950 to-neutral-900 text-white rounded-2xl p-5 relative overflow-hidden">
                <div className="absolute top-0 right-0 w-32 h-32 bg-amber-500/10 rounded-full blur-2xl" />
                <div className="relative">
                  <div className="flex items-center justify-between mb-3">
                    <div className="text-[10px] uppercase tracking-[0.25em] text-amber-400 font-bold">Body Stats · {new Date(latestMeasurement.date).toLocaleDateString('en-IN', { day: 'numeric', month: 'short' })}</div>
                    {weightDelta !== null && Math.abs(weightDelta) > 0.05 && (
                      <div className={`text-[10px] font-bold px-2 py-0.5 rounded-full ${weightDelta < 0 ? 'bg-emerald-500/20 text-emerald-300' : 'bg-amber-500/20 text-amber-300'}`}>
                        {weightDelta > 0 ? '+' : ''}{weightDelta.toFixed(1)} kg
                      </div>
                    )}
                  </div>
                  <div className="grid grid-cols-3 gap-3">
                    <div>
                      <div className="text-[10px] uppercase tracking-wider text-neutral-400 font-semibold">Weight</div>
                      <div className="display-font text-2xl font-semibold mt-0.5">{Number(latestMeasurement.weight).toFixed(1)}<span className="text-sm text-neutral-400 ml-1">kg</span></div>
                    </div>
                    <div>
                      <div className="text-[10px] uppercase tracking-wider text-neutral-400 font-semibold">Height</div>
                      <div className="display-font text-2xl font-semibold mt-0.5">{Number(latestMeasurement.height).toFixed(0)}<span className="text-sm text-neutral-400 ml-1">cm</span></div>
                    </div>
                    <div>
                      <div className="text-[10px] uppercase tracking-wider text-amber-400 font-bold">BMI</div>
                      <div className="display-font text-2xl font-semibold mt-0.5 text-amber-400">{calcBMI(latestMeasurement.weight, latestMeasurement.height)}</div>
                      <div className="text-[9px] text-neutral-400 uppercase tracking-wider">{bmiCategory(calcBMI(latestMeasurement.weight, latestMeasurement.height))}</div>
                    </div>
                  </div>
                  {myMeasurements.length > 1 && (
                    <div className="mt-4 pt-4 border-t border-neutral-800">
                      <div className="text-[10px] uppercase tracking-wider text-neutral-400 font-semibold mb-2">Progress</div>
                      <div className="space-y-1.5">
                        {myMeasurements.slice(0, 4).map((m, i) => (
                          <div key={m.id} className="flex items-center justify-between text-xs">
                            <span className="text-neutral-400">{new Date(m.date).toLocaleDateString('en-IN', { day: 'numeric', month: 'short', year: '2-digit' })}</span>
                            <div className="flex items-center gap-3">
                              <span className="text-white font-medium">{Number(m.weight).toFixed(1)} kg</span>
                              <span className="text-amber-400 font-medium">BMI {calcBMI(m.weight, m.height)}</span>
                            </div>
                          </div>
                        ))}
                      </div>
                    </div>
                  )}
                </div>
              </div>
            )}

            <div>
              <div className="flex items-center justify-between mb-3">
                <h2 className="display-font text-xl font-semibold text-neutral-900">Upcoming sessions</h2>
                <div className="text-xs text-stone-500">{upcomingSessions.length}</div>
              </div>
              {upcomingSessions.length === 0 ? (
                <div className="bg-white rounded-2xl p-6 text-center border border-stone-200 border-dashed">
                  <Icon name="Clock" size={24} className="text-stone-400 mb-2 mx-auto" />
                  <div className="text-sm text-stone-500">No sessions scheduled</div>
                  <div className="text-xs text-stone-400 mt-0.5">Check with your trainer</div>
                </div>
              ) : (
                <div className="space-y-2">
                  {upcomingSessions.slice(0, 5).map((s) => (
                    <div key={s.id} className="bg-white rounded-2xl p-4 border border-stone-200 flex items-center gap-3">
                      <div className="text-center min-w-[48px]">
                        <div className="text-[10px] uppercase tracking-wider text-amber-700 font-semibold">{new Date(s.date).toLocaleDateString('en-IN', { month: 'short' })}</div>
                        <div className="display-font text-2xl font-semibold text-neutral-900 leading-tight">{new Date(s.date).getDate()}</div>
                      </div>
                      <div className="w-px h-10 bg-stone-200" />
                      <div className="flex-1 min-w-0">
                        <div className="font-semibold text-neutral-900 text-sm">{s.time || 'Time TBD'}</div>
                        {(s.location || member.location) && <div className="text-xs text-stone-500 flex items-center gap-1 mt-0.5"><Icon name="MapPin" size={11} /> {s.location || member.location}</div>}
                        {s.notes && <div className="text-xs text-stone-600 italic mt-1 truncate">"{s.notes}"</div>}
                      </div>
                    </div>
                  ))}
                </div>
              )}
            </div>

            {completedSessions.length > 0 && (
              <div>
                <h2 className="display-font text-xl font-semibold text-neutral-900 mb-3">Recent activity</h2>
                <div className="space-y-2">
                  {[...completedSessions].sort((a, b) => b.date.localeCompare(a.date)).slice(0, 5).map((s) => (
                    <div key={s.id} className="bg-white rounded-xl p-3 border border-stone-200 flex items-center gap-3">
                      <div className="w-9 h-9 rounded-full bg-emerald-50 flex items-center justify-center text-emerald-600 flex-shrink-0">
                        <Icon name="Check" size={16} strokeWidth={3} />
                      </div>
                      <div className="flex-1 min-w-0">
                        <div className="text-sm font-semibold text-neutral-900">{new Date(s.date).toLocaleDateString('en-IN', { weekday: 'short', day: 'numeric', month: 'short' })}</div>
                        <div className="text-xs text-stone-500">{s.time} {s.location && `· ${s.location}`}</div>
                      </div>
                      <div className="text-[10px] uppercase tracking-wider text-emerald-700 font-semibold">Done</div>
                    </div>
                  ))}
                </div>
              </div>
            )}

            {myPayments.length > 0 && (
              <div>
                <h2 className="display-font text-xl font-semibold text-neutral-900 mb-3">Payment history</h2>
                <div className="space-y-2">
                  {[...myPayments].sort((a, b) => (b.date || '').localeCompare(a.date || '')).map((p) => (
                    <div key={p.id} className="bg-white rounded-xl p-3 border border-stone-200 flex items-center justify-between">
                      <div>
                        <div className="font-semibold text-neutral-900 text-sm">₹{Number(p.amount).toLocaleString('en-IN')}</div>
                        <div className="text-xs text-stone-500">{p.method} · {p.date ? new Date(p.date).toLocaleDateString('en-IN', { day: 'numeric', month: 'short', year: 'numeric' }) : '—'}</div>
                      </div>
                      <Icon name="Check" size={18} className="text-emerald-500" />
                    </div>
                  ))}
                </div>
              </div>
            )}
          </main>
        </div>
      );
    }

    function StatTile({ iconName, value, label, tone }) {
      const tones = { emerald: 'bg-emerald-50 text-emerald-700', amber: 'bg-amber-50 text-amber-700', stone: 'bg-stone-100 text-stone-700' };
      return (
        <div className="bg-white rounded-2xl p-3 border border-stone-200">
          <div className={`w-8 h-8 rounded-lg ${tones[tone]} flex items-center justify-center mb-2`}>
            <Icon name={iconName} size={16} />
          </div>
          <div className="display-font text-xl font-semibold text-neutral-900">{value}</div>
          <div className="text-[10px] uppercase tracking-wider text-stone-500 font-semibold">{label}</div>
        </div>
      );
    }

    // ===== Trainer App =====
    function TrainerApp({ members, sessions, payments, measurements, onExit }) {
      const [view, setView] = useState('dashboard');
      const [showAddMember, setShowAddMember] = useState(false);
      const [showAddSession, setShowAddSession] = useState(false);
      const [showAddPayment, setShowAddPayment] = useState(false);
      const [editingMember, setEditingMember] = useState(null);
      const [selectedMember, setSelectedMember] = useState(null);

      const saveMember = async (m) => {
        const wasNew = !m.id;
        // Strip autoGenerate flag before saving (not a persisted field)
        const { autoGenerate, ...memberData } = m;
        const saved = await Storage.save('members', memberData);
        // Auto-generate recurring sessions for new members
        if (wasNew && autoGenerate && saved && saved.scheduleDays && saved.scheduleDays.length > 0) {
          const generated = generateRecurringSessions({
            memberId: saved.id,
            scheduleDays: saved.scheduleDays,
            scheduleTime: saved.scheduleTime,
            location: saved.location,
            startDate: saved.packageStart,
            endDate: saved.packageEnd,
          });
          for (const s of generated) {
            try { await Storage.save('sessions', s); } catch (e) { console.error('Session create failed:', e); }
          }
        }
      };
      const deleteMember = async (id) => {
        if (!confirm('Delete this member and all their records?')) return;
        await Storage.delete('members', id);
        for (const s of sessions.filter((x) => x.memberId === id)) await Storage.delete('sessions', s.id);
        for (const p of payments.filter((x) => x.memberId === id)) await Storage.delete('payments', p.id);
        for (const m of measurements.filter((x) => x.memberId === id)) await Storage.delete('measurements', m.id);
      };
      const saveSession = async (s) => { await Storage.save('sessions', s); };
      const deleteSession = async (id) => { await Storage.delete('sessions', id); };
      const savePayment = async (p) => { await Storage.save('payments', p); };
      const deletePayment = async (id) => {
        if (!confirm('Delete this payment record?')) return;
        await Storage.delete('payments', id);
      };
      const saveMeasurement = async (m) => { await Storage.save('measurements', m); };
      const deleteMeasurement = async (id) => {
        if (!confirm('Delete this measurement?')) return;
        await Storage.delete('measurements', id);
      };

      const today = new Date().toISOString().split('T')[0];
      const todaysSessions = sessions.filter((s) => s.date === today).sort((a, b) => (a.time || '').localeCompare(b.time || ''));

      const memberStats = (memberId) => {
        const member = members.find((m) => m.id === memberId);
        if (!member) return { paid: 0, due: 0, sessionsCompleted: 0, totalCharged: 0, billingMode: 'package', billableSessions: 0, pastSessions: 0, noShowBillable: 0 };
        const paid = payments.filter((p) => p.memberId === memberId).reduce((sum, p) => sum + Number(p.amount), 0);
        const memberSessions = sessions.filter((s) => s.memberId === memberId);
        const sessionsCompleted = memberSessions.filter((s) => s.status === 'completed').length;
        // No-shows that the trainer decided to bill
        const noShowBillable = memberSessions.filter((s) => s.status === 'no_show' && s.billable).length;
        const pastSessions = Number(member.pastSessions || 0);
        // Total billable sessions = backfilled past + completed + billable no-shows
        const billableSessions = pastSessions + sessionsCompleted + noShowBillable;
        const billingMode = member.billingMode || 'package';
        let totalCharged = 0;
        if (billingMode === 'per_session') {
          totalCharged = Number(member.sessionRate || 0) * billableSessions;
        } else {
          totalCharged = Number(member.packageAmount || 0);
        }
        const due = totalCharged - paid;
        return { paid, due, sessionsCompleted, totalCharged, billingMode, billableSessions, pastSessions, noShowBillable };
      };

      const totalDue = members.reduce((sum, m) => sum + Math.max(0, memberStats(m.id).due), 0);
      const totalCollected = payments.reduce((sum, p) => sum + Number(p.amount), 0);

      const titles = {
        dashboard: { sub: 'Overview', main: 'Today' },
        members: { sub: 'Members', main: 'Roster' },
        sessions: { sub: 'Sessions', main: 'Schedule' },
        payments: { sub: 'Payments', main: 'Ledger' },
        reports: { sub: 'Reports', main: 'Insights' },
      };

      return (
        <div className="min-h-screen bg-stone-50 pb-24">
          <header className="px-5 pt-6 pb-5 bg-neutral-950 text-white rounded-b-3xl relative overflow-hidden">
            <div className="absolute -top-10 -right-10 w-40 h-40 bg-amber-500/10 rounded-full blur-2xl" />
            <div className="relative">
              <div className="flex items-center justify-between mb-3">
                <button onClick={onExit} className="flex items-center gap-1 text-xs text-neutral-400 font-medium active:text-white">
                  <Icon name="LogOut" size={14} /> Switch
                </button>
                <div className="flex items-center gap-2">
                  <img src="logo-white.png" alt="Stay Fit" className="h-5 w-auto opacity-90" />
                  <div className="text-[10px] uppercase tracking-[0.25em] text-amber-400 font-bold">Trainer</div>
                </div>
              </div>
              <div className="flex items-end justify-between">
                <div>
                  <div className="text-[10px] uppercase tracking-[0.25em] text-amber-400 font-bold">{titles[view].sub}</div>
                  <h1 className="display-font text-3xl font-semibold mt-1 text-white">{titles[view].main}</h1>
                </div>
              </div>
            </div>
          </header>

          <main className="px-5 pt-6">
            {view === 'dashboard' && <Dashboard members={members} sessions={sessions} payments={payments} todaysSessions={todaysSessions} totalDue={totalDue} totalCollected={totalCollected} memberStats={memberStats} setView={setView} saveSession={saveSession} />}
            {view === 'members' && <MembersView members={members} memberStats={memberStats} onAdd={() => { setEditingMember(null); setShowAddMember(true); }} onEdit={(m) => { setEditingMember(m); setShowAddMember(true); }} onDelete={deleteMember} onSelect={(m) => setSelectedMember(m)} />}
            {view === 'sessions' && <SessionsView
              members={members}
              sessions={sessions}
              onAdd={() => setShowAddSession(true)}
              onComplete={(s) => saveSession({ ...s, status: 'completed' })}
              onCancel={(s) => saveSession({ ...s, status: 'cancelled' })}
              onNoShow={(s, billable) => saveSession({ ...s, status: 'no_show', billable })}
              onReschedule={(s, date, time) => saveSession({ ...s, date, time, status: 'scheduled' })}
              onDelete={deleteSession}
            />}
            {view === 'payments' && <PaymentsView members={members} payments={payments} memberStats={memberStats} onAdd={() => setShowAddPayment(true)} onDelete={deletePayment} />}
            {view === 'reports' && <ReportsView members={members} sessions={sessions} payments={payments} memberStats={memberStats} totalDue={totalDue} totalCollected={totalCollected} />}
          </main>

          <nav className="fixed bottom-0 left-0 right-0 bg-white border-t border-stone-200 px-2 py-2 z-30" style={{ paddingBottom: 'calc(0.5rem + env(safe-area-inset-bottom))' }}>
            <div className="flex justify-around">
              {[
                { id: 'dashboard', icon: 'BarChart3', label: 'Home' },
                { id: 'members', icon: 'Users', label: 'Members' },
                { id: 'sessions', icon: 'Calendar', label: 'Sessions' },
                { id: 'payments', icon: 'Wallet', label: 'Payments' },
                { id: 'reports', icon: 'TrendingUp', label: 'Reports' },
              ].map(({ id, icon, label }) => (
                <button key={id} onClick={() => setView(id)} className={`flex flex-col items-center justify-center py-1 px-3 rounded-xl transition-all ${view === id ? 'text-neutral-900' : 'text-stone-400'}`}>
                  <Icon name={icon} size={20} strokeWidth={view === id ? 2.5 : 1.8} />
                  <span className={`text-[10px] mt-1 ${view === id ? 'font-semibold' : 'font-medium'}`}>{label}</span>
                  {view === id && <div className="w-1 h-1 rounded-full bg-amber-500 mt-0.5" />}
                </button>
              ))}
            </div>
          </nav>

          {showAddMember && <MemberForm member={editingMember} existingPhones={members.filter((x) => x.id !== editingMember?.id).map((x) => (x.phone || '').replace(/[^0-9]/g, '').slice(-10)).filter(Boolean)} onSave={async (m) => { await saveMember(m); setShowAddMember(false); setEditingMember(null); }} onClose={() => { setShowAddMember(false); setEditingMember(null); }} />}
          {showAddSession && <SessionForm members={members} onSave={async (s) => { await saveSession(s); setShowAddSession(false); }} onClose={() => setShowAddSession(false)} />}
          {showAddPayment && <PaymentForm members={members} memberStats={memberStats} onSave={async (p) => { await savePayment(p); setShowAddPayment(false); }} onClose={() => setShowAddPayment(false)} />}
          {selectedMember && <MemberDetail
            member={selectedMember}
            stats={memberStats(selectedMember.id)}
            sessions={sessions.filter((s) => s.memberId === selectedMember.id)}
            payments={payments.filter((p) => p.memberId === selectedMember.id)}
            measurements={measurements.filter((m) => m.memberId === selectedMember.id)}
            onAddMeasurement={saveMeasurement}
            onDeleteMeasurement={deleteMeasurement}
            onClose={() => setSelectedMember(null)}
          />}
        </div>
      );
    }

    function Dashboard({ members, sessions, payments, todaysSessions, totalDue, totalCollected, memberStats, setView, saveSession }) {
      const activeMembers = members.filter((m) => memberStats(m.id).due >= 0).length;
      return (
        <div className="space-y-5">
          <div className="grid grid-cols-2 gap-3">
            <button onClick={() => setView('members')} className="bg-white rounded-2xl p-4 text-left border border-stone-200 active:scale-95 transition">
              <div className="text-xs uppercase tracking-wider text-stone-500 font-medium">Members</div>
              <div className="display-font text-3xl font-semibold text-neutral-900 mt-1">{members.length}</div>
              <div className="text-xs text-stone-500 mt-1">{activeMembers} active</div>
            </button>
            <button onClick={() => setView('sessions')} className="bg-white rounded-2xl p-4 text-left border border-stone-200 active:scale-95 transition">
              <div className="text-xs uppercase tracking-wider text-stone-500 font-medium">Today</div>
              <div className="display-font text-3xl font-semibold text-neutral-900 mt-1">{todaysSessions.length}</div>
              <div className="text-xs text-stone-500 mt-1">sessions scheduled</div>
            </button>
            <button onClick={() => setView('payments')} className="bg-neutral-950 text-white rounded-2xl p-4 text-left active:scale-95 transition">
              <div className="text-xs uppercase tracking-wider text-amber-400 font-medium">Collected</div>
              <div className="display-font text-3xl font-semibold mt-1">₹{totalCollected.toLocaleString('en-IN')}</div>
              <div className="text-xs text-stone-400 mt-1">all-time</div>
            </button>
            <button onClick={() => setView('payments')} className="bg-amber-400 rounded-2xl p-4 text-left active:scale-95 transition">
              <div className="text-xs uppercase tracking-wider text-neutral-900 font-medium">Pending</div>
              <div className="display-font text-3xl font-semibold text-neutral-900 mt-1">₹{totalDue.toLocaleString('en-IN')}</div>
              <div className="text-xs text-stone-800 mt-1">to collect</div>
            </button>
          </div>

          <div>
            <div className="flex items-center justify-between mb-3">
              <h2 className="display-font text-xl font-semibold text-neutral-900">Today's sessions</h2>
              <button onClick={() => setView('sessions')} className="text-xs text-stone-500 font-medium flex items-center gap-1">View all <Icon name="ChevronRight" size={14} /></button>
            </div>
            {todaysSessions.length === 0 ? (
              <div className="bg-white rounded-2xl p-6 text-center border border-stone-200 border-dashed">
                <Icon name="Clock" size={28} className="text-stone-400 mb-2 mx-auto" />
                <div className="text-sm text-stone-500">No sessions today</div>
              </div>
            ) : (
              <div className="space-y-2">
                {todaysSessions.map((s) => {
                  const m = members.find((x) => x.id === s.memberId);
                  return (
                    <div key={s.id} className="bg-white rounded-2xl p-4 border border-stone-200 flex items-center gap-3">
                      <div className="text-center min-w-[52px]">
                        <div className="display-font text-lg font-semibold text-neutral-900 leading-tight">{s.time?.split(':')[0] || '—'}</div>
                        <div className="text-[10px] uppercase tracking-wider text-stone-500">{s.time ? `:${s.time.split(':')[1]}` : ''}</div>
                      </div>
                      <div className="w-px h-10 bg-stone-200" />
                      <div className="flex-1 min-w-0">
                        <div className="font-semibold text-neutral-900 truncate">{m?.name || 'Unknown'}</div>
                        <div className="text-xs text-stone-500 flex items-center gap-1 mt-0.5"><Icon name="MapPin" size={11} /> {s.location || m?.location || 'No location'}</div>
                      </div>
                      {s.status === 'completed' ? <div className="px-2 py-1 bg-emerald-50 text-emerald-700 rounded-full text-[10px] font-semibold uppercase tracking-wider">Done</div>
                      : s.status === 'cancelled' ? <div className="px-2 py-1 bg-stone-100 text-stone-500 rounded-full text-[10px] font-semibold uppercase tracking-wider">Cancelled</div>
                      : <button onClick={() => saveSession({ ...s, status: 'completed' })} className="w-9 h-9 rounded-full bg-neutral-950 text-white flex items-center justify-center active:scale-90 transition"><Icon name="Check" size={16} strokeWidth={3} /></button>}
                    </div>
                  );
                })}
              </div>
            )}
          </div>

          {totalDue > 0 && (
            <div className="bg-gradient-to-br from-amber-50 to-orange-50 border border-amber-200 rounded-2xl p-4">
              <div className="flex items-start gap-3">
                <Icon name="AlertCircle" size={18} className="text-amber-700 flex-shrink-0 mt-0.5" />
                <div className="flex-1">
                  <div className="font-semibold text-neutral-900 text-sm">Outstanding dues</div>
                  <div className="text-xs text-stone-700 mt-1">{members.filter((m) => memberStats(m.id).due > 0).length} members owe ₹{totalDue.toLocaleString('en-IN')}</div>
                  <button onClick={() => setView('payments')} className="text-xs font-semibold text-amber-900 mt-2 flex items-center gap-1">Review <Icon name="ChevronRight" size={12} /></button>
                </div>
              </div>
            </div>
          )}

          {members.length === 0 && (
            <div className="bg-white rounded-2xl p-8 text-center border border-stone-200 border-dashed">
              <Icon name="Users" size={32} className="text-stone-400 mb-3 mx-auto" />
              <div className="display-font text-lg font-semibold text-neutral-900">Start by adding members</div>
              <div className="text-sm text-stone-500 mt-1">Tap the Members tab below</div>
            </div>
          )}
        </div>
      );
    }

    function MembersView({ members, memberStats, onAdd, onEdit, onDelete, onSelect }) {
      return (
        <div className="space-y-3">
          <button onClick={onAdd} className="w-full bg-neutral-950 text-white rounded-2xl p-4 flex items-center justify-center gap-2 font-semibold active:scale-[0.98] transition">
            <Icon name="Plus" size={18} /> Add new member
          </button>
          {members.length === 0 ? (
            <div className="bg-white rounded-2xl p-8 text-center border border-stone-200 border-dashed">
              <Icon name="Users" size={28} className="text-stone-400 mb-2 mx-auto" />
              <div className="text-sm text-stone-500">No members yet</div>
            </div>
          ) : members.map((m) => {
            const stats = memberStats(m.id);
            return (
              <div key={m.id} className="bg-white rounded-2xl border border-stone-200 overflow-hidden">
                <button onClick={() => onSelect(m)} className="w-full p-4 text-left active:bg-stone-50 transition">
                  <div className="flex items-start gap-3">
                    <div className="w-11 h-11 rounded-full bg-stone-100 flex items-center justify-center text-neutral-900 font-semibold display-font flex-shrink-0">{m.name?.[0]?.toUpperCase() || '?'}</div>
                    <div className="flex-1 min-w-0">
                      <div className="flex items-center gap-2">
                        <div className="font-semibold text-neutral-900 truncate">{m.name}</div>
                        {stats.due > 0 && <div className="w-1.5 h-1.5 rounded-full bg-amber-500 pulse-dot flex-shrink-0" />}
                      </div>
                      <div className="text-xs text-stone-500 mt-0.5 flex items-center gap-2 flex-wrap">
                        <span>{m.billingMode === 'per_session' ? `₹${Number(m.sessionRate || 0)}/session` : m.packageType}</span>
                        {m.location && <><span>·</span><span className="flex items-center gap-0.5"><Icon name="MapPin" size={10} />{m.location}</span></>}
                      </div>
                      <div className="flex items-center gap-3 mt-2 text-xs">
                        <span className="text-stone-600">Paid <strong className="text-neutral-900">₹{stats.paid.toLocaleString('en-IN')}</strong></span>
                        {stats.due > 0 ? <span className="text-amber-700">Due <strong>₹{stats.due.toLocaleString('en-IN')}</strong></span>
                        : stats.due < 0 ? <span className="text-emerald-700">Advance <strong>₹{Math.abs(stats.due).toLocaleString('en-IN')}</strong></span>
                        : <span className="text-emerald-700 font-semibold">Cleared</span>}
                      </div>
                    </div>
                  </div>
                </button>
                <div className="flex border-t border-stone-100">
                  {m.phone && <a href={`tel:${m.phone}`} className="flex-1 py-2.5 text-xs text-stone-600 font-medium flex items-center justify-center gap-1 active:bg-stone-50"><Icon name="Phone" size={12} /> Call</a>}
                  <button onClick={() => onEdit(m)} className="flex-1 py-2.5 text-xs text-stone-600 font-medium flex items-center justify-center gap-1 active:bg-stone-50 border-l border-stone-100"><Icon name="Edit2" size={12} /> Edit</button>
                  <button onClick={() => onDelete(m.id)} className="flex-1 py-2.5 text-xs text-red-600 font-medium flex items-center justify-center gap-1 active:bg-red-50 border-l border-stone-100"><Icon name="Trash2" size={12} /> Delete</button>
                </div>
              </div>
            );
          })}
        </div>
      );
    }

    function SessionsView({ members, sessions, onAdd, onComplete, onCancel, onNoShow, onReschedule, onDelete }) {
      const [filter, setFilter] = useState('upcoming');
      const [rescheduleSession, setRescheduleSession] = useState(null);
      const [noShowChoice, setNoShowChoice] = useState(null);
      const today = new Date().toISOString().split('T')[0];

      let filtered = sessions;
      if (filter === 'upcoming') filtered = sessions.filter((s) => s.date >= today && s.status !== 'cancelled' && s.status !== 'completed' && s.status !== 'no_show');
      else if (filter === 'completed') filtered = sessions.filter((s) => s.status === 'completed');
      else if (filter === 'missed') filtered = sessions.filter((s) => s.status === 'no_show');
      else if (filter === 'cancelled') filtered = sessions.filter((s) => s.status === 'cancelled');
      else if (filter === 'overdue') filtered = sessions.filter((s) => s.date < today && (!s.status || s.status === 'scheduled'));

      filtered = [...filtered].sort((a, b) => {
        const da = `${a.date} ${a.time || ''}`, db = `${b.date} ${b.time || ''}`;
        return filter === 'completed' ? db.localeCompare(da) : da.localeCompare(db);
      });

      const overdueCount = sessions.filter((s) => s.date < today && (!s.status || s.status === 'scheduled')).length;

      return (
        <div className="space-y-3">
          <button onClick={onAdd} className="w-full bg-neutral-950 text-white rounded-2xl p-4 flex items-center justify-center gap-2 font-semibold active:scale-[0.98] transition">
            <Icon name="Plus" size={18} /> Schedule session
          </button>

          {overdueCount > 0 && filter !== 'overdue' && (
            <button onClick={() => setFilter('overdue')} className="w-full bg-amber-50 border border-amber-200 rounded-2xl p-3 flex items-center justify-between active:scale-[0.99]">
              <div className="flex items-center gap-2">
                <Icon name="AlertCircle" size={16} className="text-amber-700" />
                <span className="text-sm font-semibold text-amber-900">{overdueCount} session{overdueCount > 1 ? 's' : ''} need{overdueCount === 1 ? 's' : ''} action</span>
              </div>
              <Icon name="ChevronRight" size={14} className="text-amber-700" />
            </button>
          )}

          <div className="flex gap-2 overflow-x-auto pb-1 -mx-1 px-1">
            {[
              { id: 'upcoming', label: 'Upcoming' },
              { id: 'overdue', label: `Overdue${overdueCount > 0 ? ` (${overdueCount})` : ''}` },
              { id: 'completed', label: 'Completed' },
              { id: 'missed', label: 'Missed' },
              { id: 'cancelled', label: 'Cancelled' },
              { id: 'all', label: 'All' },
            ].map((f) => (
              <button key={f.id} onClick={() => setFilter(f.id)} className={`px-4 py-1.5 rounded-full text-xs font-semibold uppercase tracking-wider whitespace-nowrap transition ${filter === f.id ? 'bg-neutral-950 text-white' : 'bg-white text-stone-600 border border-stone-200'}`}>{f.label}</button>
            ))}
          </div>

          {filtered.length === 0 ? (
            <div className="bg-white rounded-2xl p-8 text-center border border-stone-200 border-dashed">
              <Icon name="Calendar" size={28} className="text-stone-400 mb-2 mx-auto" />
              <div className="text-sm text-stone-500">No {filter} sessions</div>
            </div>
          ) : filtered.map((s) => {
            const m = members.find((x) => x.id === s.memberId);
            const isOverdue = s.date < today && (!s.status || s.status === 'scheduled');
            return (
              <div key={s.id} className={`bg-white rounded-2xl p-4 border ${isOverdue ? 'border-amber-300 bg-amber-50/30' : 'border-stone-200'}`}>
                <div className="flex items-start gap-3">
                  <div className="text-center min-w-[48px]">
                    <div className={`text-[10px] uppercase tracking-wider font-semibold ${isOverdue ? 'text-amber-700' : 'text-stone-500'}`}>{new Date(s.date).toLocaleDateString('en-IN', { weekday: 'short' })}</div>
                    <div className="display-font text-2xl font-semibold text-neutral-900 leading-tight">{new Date(s.date).getDate()}</div>
                    <div className="text-[10px] text-stone-500">{new Date(s.date).toLocaleDateString('en-IN', { month: 'short' })}</div>
                    <div className="text-[10px] text-stone-600 font-semibold mt-0.5">{s.time || '—'}</div>
                  </div>
                  <div className="w-px h-16 bg-stone-200" />
                  <div className="flex-1 min-w-0">
                    <div className="flex items-center gap-2">
                      <div className="font-semibold text-neutral-900 truncate">{m?.name || 'Unknown'}</div>
                      {s.recurring && <Icon name="Repeat" size={11} className="text-stone-400" />}
                    </div>
                    {s.location && <div className="text-xs text-stone-500 flex items-center gap-1 mt-0.5"><Icon name="MapPin" size={11} /> {s.location}</div>}
                    {s.notes && <div className="text-xs text-stone-600 mt-1 italic">"{s.notes}"</div>}

                    <div className="flex flex-wrap items-center gap-1.5 mt-2">
                      {s.status === 'completed' && <div className="px-2 py-0.5 bg-emerald-50 text-emerald-700 rounded-full text-[10px] font-semibold uppercase tracking-wider">Completed</div>}
                      {s.status === 'cancelled' && <div className="px-2 py-0.5 bg-stone-100 text-stone-500 rounded-full text-[10px] font-semibold uppercase tracking-wider">Cancelled</div>}
                      {s.status === 'no_show' && (
                        <div className={`px-2 py-0.5 rounded-full text-[10px] font-semibold uppercase tracking-wider ${s.billable ? 'bg-amber-100 text-amber-800' : 'bg-stone-100 text-stone-500'}`}>
                          No-show {s.billable ? '· Billed' : '· Free pass'}
                        </div>
                      )}
                      {(!s.status || s.status === 'scheduled') && (
                        <>
                          <button onClick={() => onComplete(s)} className="px-3 py-1 bg-neutral-950 text-white rounded-full text-[11px] font-semibold active:scale-95 transition flex items-center gap-1">
                            <Icon name="Check" size={11} strokeWidth={3} /> Done
                          </button>
                          <button onClick={() => setNoShowChoice(s)} className="px-3 py-1 bg-amber-100 text-amber-800 rounded-full text-[11px] font-semibold active:scale-95 transition">No-show</button>
                          <button onClick={() => setRescheduleSession(s)} className="px-3 py-1 bg-stone-100 text-stone-700 rounded-full text-[11px] font-semibold active:scale-95 transition flex items-center gap-1">
                            <Icon name="CalendarClock" size={11} /> Reschedule
                          </button>
                          <button onClick={() => onCancel(s)} className="px-3 py-1 text-stone-500 rounded-full text-[11px] font-semibold active:bg-stone-100 transition">Cancel</button>
                        </>
                      )}
                      {(s.status === 'cancelled' || s.status === 'no_show') && (
                        <button onClick={() => setRescheduleSession(s)} className="px-3 py-1 bg-stone-900 text-white rounded-full text-[11px] font-semibold active:scale-95 transition flex items-center gap-1">
                          <Icon name="CalendarClock" size={11} /> Reschedule
                        </button>
                      )}
                      <button onClick={() => onDelete(s.id)} className="ml-auto text-stone-400 active:text-red-500"><Icon name="Trash2" size={14} /></button>
                    </div>
                  </div>
                </div>
              </div>
            );
          })}

          {noShowChoice && (
            <NoShowDialog session={noShowChoice}
              member={members.find((x) => x.id === noShowChoice.memberId)}
              onChoose={(billable) => { onNoShow(noShowChoice, billable); setNoShowChoice(null); }}
              onReschedule={() => { setRescheduleSession(noShowChoice); setNoShowChoice(null); }}
              onClose={() => setNoShowChoice(null)} />
          )}

          {rescheduleSession && (
            <RescheduleDialog session={rescheduleSession}
              onSave={(date, time) => { onReschedule(rescheduleSession, date, time); setRescheduleSession(null); }}
              onClose={() => setRescheduleSession(null)} />
          )}
        </div>
      );
    }

    function NoShowDialog({ session, member, onChoose, onReschedule, onClose }) {
      const isPerSession = member?.billingMode === 'per_session';
      const rate = Number(member?.sessionRate || 0);
      return (
        <div className="fixed inset-0 bg-black/50 z-50 flex items-end" onClick={onClose}>
          <div className="bg-stone-50 rounded-t-3xl w-full slide-up" onClick={(e) => e.stopPropagation()}>
            <div className="px-5 pt-5 pb-3 flex items-center justify-between border-b border-stone-200">
              <h2 className="display-font text-xl font-semibold text-neutral-900">Mark as no-show</h2>
              <button onClick={onClose} className="w-8 h-8 rounded-full bg-stone-200 flex items-center justify-center"><Icon name="X" size={16} /></button>
            </div>
            <div className="p-5 space-y-3">
              <div className="text-sm text-stone-600">
                <span className="font-semibold text-neutral-900">{member?.name}</span> didn't show up for the session on {new Date(session.date).toLocaleDateString('en-IN', { weekday: 'long', day: 'numeric', month: 'short' })}.
              </div>

              <button onClick={() => onReschedule()} className="w-full bg-white border border-stone-200 rounded-2xl p-4 text-left active:bg-stone-50 transition flex items-center justify-between">
                <div>
                  <div className="font-semibold text-neutral-900 text-sm flex items-center gap-2"><Icon name="CalendarClock" size={14} /> Reschedule instead</div>
                  <div className="text-xs text-stone-500 mt-0.5">Move this session to another day</div>
                </div>
                <Icon name="ChevronRight" size={16} className="text-stone-400" />
              </button>

              <button onClick={() => onChoose(true)} className="w-full bg-amber-100 border border-amber-200 rounded-2xl p-4 text-left active:bg-amber-200 transition">
                <div className="font-semibold text-amber-900 text-sm flex items-center gap-2"><Icon name="IndianRupee" size={14} /> Bill it</div>
                <div className="text-xs text-amber-800 mt-0.5">
                  {isPerSession ? `Counts toward dues (+₹${rate.toLocaleString('en-IN')})` : 'Counts toward session total'}
                </div>
              </button>

              <button onClick={() => onChoose(false)} className="w-full bg-white border border-stone-200 rounded-2xl p-4 text-left active:bg-stone-50 transition">
                <div className="font-semibold text-neutral-900 text-sm flex items-center gap-2"><Icon name="Gift" size={14} /> Free pass</div>
                <div className="text-xs text-stone-500 mt-0.5">Skip — don't bill, doesn't count toward sessions</div>
              </button>
            </div>
          </div>
        </div>
      );
    }

    function RescheduleDialog({ session, onSave, onClose }) {
      const [date, setDate] = useState(session.date);
      const [time, setTime] = useState(session.time || '07:00');
      return (
        <div className="fixed inset-0 bg-black/50 z-50 flex items-end" onClick={onClose}>
          <div className="bg-stone-50 rounded-t-3xl w-full slide-up" onClick={(e) => e.stopPropagation()}>
            <div className="px-5 pt-5 pb-3 flex items-center justify-between border-b border-stone-200">
              <h2 className="display-font text-xl font-semibold text-neutral-900">Reschedule</h2>
              <button onClick={onClose} className="w-8 h-8 rounded-full bg-stone-200 flex items-center justify-center"><Icon name="X" size={16} /></button>
            </div>
            <div className="p-5 space-y-4">
              <div className="text-xs text-stone-500">Original: {new Date(session.date).toLocaleDateString('en-IN', { weekday: 'long', day: 'numeric', month: 'short' })} · {session.time}</div>
              <div className="grid grid-cols-2 gap-3">
                <Field label="New date"><input type="date" value={date} onChange={(e) => setDate(e.target.value)} className="form-input" /></Field>
                <Field label="New time"><input type="time" value={time} onChange={(e) => setTime(e.target.value)} className="form-input" /></Field>
              </div>
              <button onClick={() => onSave(date, time)} className="w-full bg-neutral-950 text-white rounded-2xl py-4 font-semibold active:scale-[0.98] transition">Confirm reschedule</button>
            </div>
          </div>
        </div>
      );
    }

    function PaymentsView({ members, payments, memberStats, onAdd, onDelete }) {
      const [tab, setTab] = useState('dues');
      const sortedPayments = [...payments].sort((a, b) => (b.date || '').localeCompare(a.date || ''));
      const membersWithDues = members.map((m) => ({ member: m, stats: memberStats(m.id) })).filter(({ stats }) => stats.due > 0).sort((a, b) => b.stats.due - a.stats.due);

      return (
        <div className="space-y-3">
          <button onClick={onAdd} className="w-full bg-neutral-950 text-white rounded-2xl p-4 flex items-center justify-center gap-2 font-semibold active:scale-[0.98] transition">
            <Icon name="Plus" size={18} /> Record payment
          </button>
          <div className="flex gap-2">
            <button onClick={() => setTab('dues')} className={`flex-1 py-2 rounded-full text-xs font-semibold uppercase tracking-wider transition ${tab === 'dues' ? 'bg-neutral-950 text-white' : 'bg-white text-stone-600 border border-stone-200'}`}>Pending Dues ({membersWithDues.length})</button>
            <button onClick={() => setTab('history')} className={`flex-1 py-2 rounded-full text-xs font-semibold uppercase tracking-wider transition ${tab === 'history' ? 'bg-neutral-950 text-white' : 'bg-white text-stone-600 border border-stone-200'}`}>History</button>
          </div>
          {tab === 'dues' && (membersWithDues.length === 0 ? (
            <div className="bg-emerald-50 rounded-2xl p-6 text-center border border-emerald-100">
              <Icon name="Check" size={28} className="text-emerald-600 mb-2 mx-auto" />
              <div className="font-semibold text-emerald-900">All cleared!</div>
              <div className="text-xs text-emerald-700 mt-0.5">No pending dues</div>
            </div>
          ) : membersWithDues.map(({ member, stats }) => {
            const isPerSession = member.billingMode === 'per_session';
            const subline = isPerSession
              ? `₹${Number(member.sessionRate || 0)}/session · ${stats.sessionsCompleted} done`
              : `${member.packageType} · ₹${Number(member.packageAmount || 0).toLocaleString('en-IN')}`;
            const whatsappMsg = isPerSession
              ? `Hi ${member.name}, just a friendly reminder — ₹${stats.due} is pending for ${stats.sessionsCompleted} session${stats.sessionsCompleted === 1 ? '' : 's'} completed at ₹${Number(member.sessionRate || 0)} each. Thanks!`
              : `Hi ${member.name}, just a friendly reminder that ₹${stats.due} is pending for your ${member.packageType} package. Thanks!`;
            return (
            <div key={member.id} className="bg-white rounded-2xl p-4 border border-stone-200">
              <div className="flex items-center justify-between">
                <div className="flex-1 min-w-0">
                  <div className="font-semibold text-neutral-900 truncate">{member.name}</div>
                  <div className="text-xs text-stone-500 mt-0.5">{subline}</div>
                </div>
                <div className="text-right ml-3">
                  <div className="display-font text-xl font-semibold text-amber-700">₹{stats.due.toLocaleString('en-IN')}</div>
                  <div className="text-[10px] uppercase tracking-wider text-stone-500">due</div>
                </div>
              </div>
              {member.phone && (
                <a href={`https://wa.me/${member.phone.replace(/[^0-9]/g, '')}?text=${encodeURIComponent(whatsappMsg)}`} target="_blank" rel="noopener noreferrer" className="mt-3 w-full block text-center py-2 bg-emerald-500 text-white rounded-xl text-xs font-semibold active:scale-95 transition">
                  Send WhatsApp reminder
                </a>
              )}
            </div>
            );
          }))}
          {tab === 'history' && (sortedPayments.length === 0 ? (
            <div className="bg-white rounded-2xl p-8 text-center border border-stone-200 border-dashed">
              <Icon name="Wallet" size={28} className="text-stone-400 mb-2 mx-auto" />
              <div className="text-sm text-stone-500">No payments yet</div>
            </div>
          ) : sortedPayments.map((p) => {
            const m = members.find((x) => x.id === p.memberId);
            return (
              <div key={p.id} className="bg-white rounded-2xl p-4 border border-stone-200 flex items-center gap-3">
                <div className="w-10 h-10 rounded-full bg-emerald-50 flex items-center justify-center text-emerald-600"><Icon name="Check" size={18} strokeWidth={2.5} /></div>
                <div className="flex-1 min-w-0">
                  <div className="font-semibold text-neutral-900 truncate">{m?.name || 'Unknown'}</div>
                  <div className="text-xs text-stone-500 mt-0.5">{p.date ? new Date(p.date).toLocaleDateString('en-IN', { day: 'numeric', month: 'short', year: 'numeric' }) : '—'}{p.method && ` · ${p.method}`}</div>
                </div>
                <div className="text-right"><div className="display-font text-lg font-semibold text-neutral-900">₹{Number(p.amount).toLocaleString('en-IN')}</div></div>

            );
          }))}
