      );
    }

    function ReportsView({ members, sessions, payments, memberStats, totalDue, totalCollected }) {
      const now = new Date();
      const thisMonth = `${now.getFullYear()}-${String(now.getMonth() + 1).padStart(2, '0')}`;
      const thisMonthPayments = payments.filter((p) => p.date?.startsWith(thisMonth));
      const thisMonthCollected = thisMonthPayments.reduce((s, p) => s + Number(p.amount), 0);
      const thisMonthSessions = sessions.filter((s) => s.date?.startsWith(thisMonth));
      const completedThisMonth = thisMonthSessions.filter((s) => s.status === 'completed').length;

      const locationBreakdown = {};
      members.forEach((m) => {
        const loc = m.location || 'Unspecified';
        if (!locationBreakdown[loc]) locationBreakdown[loc] = { count: 0, revenue: 0 };
        locationBreakdown[loc].count += 1;
        locationBreakdown[loc].revenue += memberStats(m.id).paid;
      });

      const packageBreakdown = {};
      members.forEach((m) => {
        const pkg = m.packageType || 'Other';
        packageBreakdown[pkg] = (packageBreakdown[pkg] || 0) + 1;
      });

      return (
        <div className="space-y-4">
          <div className="bg-neutral-950 text-white rounded-2xl p-5">
            <div className="text-xs uppercase tracking-[0.2em] text-amber-400 font-medium">This Month</div>
            <div className="mt-2 display-font text-4xl font-semibold">₹{thisMonthCollected.toLocaleString('en-IN')}</div>
            <div className="text-sm text-stone-400 mt-1">collected from {thisMonthPayments.length} payments</div>
            <div className="mt-4 pt-4 border-t border-stone-700 grid grid-cols-2 gap-4">
              <div><div className="text-xs text-stone-400">Sessions held</div><div className="display-font text-2xl font-semibold mt-1">{completedThisMonth}</div></div>
              <div><div className="text-xs text-stone-400">Total scheduled</div><div className="display-font text-2xl font-semibold mt-1">{thisMonthSessions.length}</div></div>
            </div>
          </div>

          <div className="bg-white rounded-2xl p-5 border border-stone-200">
            <div className="text-xs uppercase tracking-wider text-stone-500 font-medium">All-time</div>
            <div className="grid grid-cols-2 gap-3 mt-3">
              <div><div className="display-font text-2xl font-semibold text-neutral-900">₹{totalCollected.toLocaleString('en-IN')}</div><div className="text-xs text-stone-500 mt-0.5">Collected</div></div>
              <div><div className="display-font text-2xl font-semibold text-amber-700">₹{totalDue.toLocaleString('en-IN')}</div><div className="text-xs text-stone-500 mt-0.5">Outstanding</div></div>
            </div>
          </div>

          {Object.keys(locationBreakdown).length > 0 && (
            <div className="bg-white rounded-2xl p-5 border border-stone-200">
              <div className="text-xs uppercase tracking-wider text-stone-500 font-medium mb-3">By Location</div>
              <div className="space-y-3">
                {Object.entries(locationBreakdown).sort((a, b) => b[1].revenue - a[1].revenue).map(([loc, data]) => (
                  <div key={loc}>
                    <div className="flex justify-between items-baseline mb-1">
                      <div className="text-sm font-semibold text-neutral-900 flex items-center gap-1"><Icon name="MapPin" size={12} className="text-stone-500" /> {loc}</div>
                      <div className="display-font text-sm font-semibold text-neutral-900">₹{data.revenue.toLocaleString('en-IN')}</div>
                    </div>
                    <div className="flex items-center gap-2">
                      <div className="flex-1 h-1.5 bg-stone-100 rounded-full overflow-hidden">
                        <div className="h-full bg-amber-400" style={{ width: `${(data.revenue / Math.max(1, Math.max(...Object.values(locationBreakdown).map((d) => d.revenue)))) * 100}%` }} />
                      </div>
                      <div className="text-[10px] text-stone-500 w-12 text-right">{data.count} members</div>
                    </div>
                  </div>
                ))}
              </div>
            </div>
          )}

          {Object.keys(packageBreakdown).length > 0 && (
            <div className="bg-white rounded-2xl p-5 border border-stone-200">
              <div className="text-xs uppercase tracking-wider text-stone-500 font-medium mb-3">Package Mix</div>
              <div className="space-y-2">
                {Object.entries(packageBreakdown).sort((a, b) => b[1] - a[1]).map(([pkg, count]) => (
                  <div key={pkg} className="flex items-center justify-between">
                    <div className="text-sm text-stone-700">{pkg}</div>
                    <div className="flex items-center gap-2"><div className="display-font text-sm font-semibold text-neutral-900">{count}</div><div className="text-[10px] text-stone-500">members</div></div>
                  </div>
                ))}
              </div>
            </div>
          )}
        </div>
      );
    }

    function Field({ label, children }) {
      return (<div><label className="block text-xs font-semibold uppercase tracking-wider text-stone-500 mb-1.5">{label}</label>{children}</div>);
    }

              </Field>
              <Field label="Training location"><input type="text" value={form.location} onChange={(e) => setForm({ ...form, location: e.target.value })} className="form-input" placeholder="e.g. Home, Park, Gym A" /></Field>

              <Field label="Billing mode">
                <div className="grid grid-cols-2 gap-2">
                  <button type="button" onClick={() => setForm({ ...form, billingMode: 'package' })} className={`p-3 rounded-xl border text-left transition ${!isPerSession ? 'bg-neutral-950 text-white border-neutral-950' : 'bg-white text-neutral-700 border-stone-200'}`}>
                    <div className="text-xs font-bold uppercase tracking-wider">Flat Package</div>
                    <div className="text-[10px] mt-0.5 opacity-75">Fixed price for the period</div>
                  </button>
                  <button type="button" onClick={() => setForm({ ...form, billingMode: 'per_session' })} className={`p-3 rounded-xl border text-left transition ${isPerSession ? 'bg-neutral-950 text-white border-neutral-950' : 'bg-white text-neutral-700 border-stone-200'}`}>
                    <div className="text-xs font-bold uppercase tracking-wider">Per Session</div>
                    <div className="text-[10px] mt-0.5 opacity-75">Charge by sessions completed</div>
                  </button>
                </div>
              </Field>

              {isPerSession ? (
                <div className="grid grid-cols-2 gap-3">
                  <Field label="Rate per session (₹) *"><input type="number" inputMode="numeric" value={form.sessionRate} onChange={(e) => setForm({ ...form, sessionRate: e.target.value })} className="form-input" placeholder="500" /></Field>
                  <Field label="Sessions / week"><input type="number" inputMode="numeric" value={form.sessionsPerWeek} onChange={(e) => setForm({ ...form, sessionsPerWeek: e.target.value })} className="form-input" placeholder="3" /></Field>
                </div>
              ) : (
                <>
                  <Field label="Package type">
                    <select value={form.packageType} onChange={(e) => setForm({ ...form, packageType: e.target.value })} className="form-input">
                      <option>Monthly</option><option>3 Months</option><option>6 Months</option><option>Yearly</option><option>Session-wise</option><option>Custom</option>
                    </select>
                  </Field>
                  <div className="grid grid-cols-2 gap-3">
                    <Field label="Package amount (₹) *"><input type="number" inputMode="numeric" value={form.packageAmount} onChange={(e) => setForm({ ...form, packageAmount: e.target.value })} className="form-input" placeholder="5000" /></Field>
                    <Field label="Total sessions"><input type="number" inputMode="numeric" value={form.sessionsTotal} onChange={(e) => setForm({ ...form, sessionsTotal: e.target.value })} className="form-input" placeholder="12" /></Field>
                  </div>
                </>
              )}

              <div className="grid grid-cols-2 gap-3">
                <Field label={isPerSession ? "Started on" : "Package start"}><input type="date" value={form.packageStart} onChange={(e) => setForm({ ...form, packageStart: e.target.value })} className="form-input" /></Field>
                <Field label={isPerSession ? "Until (optional)" : "Package end"}><input type="date" value={form.packageEnd} onChange={(e) => setForm({ ...form, packageEnd: e.target.value })} className="form-input" /></Field>
              </div>

              {/* Past sessions backfill — shown for new members or always editable */}
              <div className="bg-amber-50 border border-amber-200 rounded-xl p-3">
                <div className="flex items-start gap-2">
                  <Icon name="History" size={14} className="text-amber-700 mt-0.5" />
                  <div className="flex-1">

                    <div className="text-[10px] text-amber-700 mt-0.5 mb-2">Counts toward billing but won't appear in session history. Use this if the member already trained before being added.</div>
                    <input type="number" inputMode="numeric" min="0" value={form.pastSessions || ''}
                      onChange={(e) => setForm({ ...form, pastSessions: e.target.value })}
                      className="form-input bg-white" placeholder="e.g. 4" />

              {/* Weekly schedule */}
              <div className="bg-white border border-stone-200 rounded-xl p-4">
                <div className="flex items-center justify-between mb-3">
                  <div>
                    <div className="text-xs font-bold text-neutral-900 uppercase tracking-wider">Weekly schedule</div>
                    <div className="text-[10px] text-stone-500 mt-0.5">Pick training days · Sunday closed</div>

                        className={`flex-1 py-2 rounded-lg text-[11px] font-bold uppercase tracking-wider transition ${on ? 'bg-neutral-950 text-amber-400' : 'bg-stone-100 text-stone-500'}`}>
                        {d.label}
                      </button>
                    );

                <div className="mt-3">
                  <label className="block text-[10px] uppercase tracking-wider text-stone-500 font-bold mb-1.5">Session time</label>
                  <input type="time" value={form.scheduleTime || '07:00'} onChange={(e) => setForm({ ...form, scheduleTime: e.target.value })} className="form-input" />

                {isNew && scheduleDays.length > 0 && (

                    <input type="checkbox" checked={!!form.autoGenerate}

              <button onClick={handleSubmit} disabled={saving} className="w-full bg-neutral-950 text-white rounded-2xl py-4 font-semibold active:scale-[0.98] transition disabled:opacity-60">
                {saving ? 'Saving…' : (member ? 'Save changes' : 'Add member')}
              </button>
            </div>
          </div>
        </div>
      );

                    <span>
                      {member.scheduleDays.map((d) => DAYS.find((x) => x.v === d)?.label).filter(Boolean).join(' · ')}
                      {member.scheduleTime && <span className="text-stone-500"> @ {member.scheduleTime}</span>}
                    </span>
                  } />
                )}
                {member.notes && <Row label="Notes" value={member.notes} />}
              </div>

              {/* Stats grid */}
              <div className="grid grid-cols-2 gap-2">
                <div className="bg-white rounded-xl p-3 border border-stone-200">
                  <div className="text-[10px] uppercase tracking-wider text-stone-500 font-semibold">Charged</div>
                  <div className="display-font text-lg font-semibold text-neutral-900 mt-0.5">₹{stats.totalCharged.toLocaleString('en-IN')}</div>
                  {isPerSession && <div className="text-[10px] text-stone-500">{stats.billableSessions} × ₹{Number(member.sessionRate || 0)}</div>}
                </div>
                <div className="bg-white rounded-xl p-3 border border-stone-200">
                  <div className="text-[10px] uppercase tracking-wider text-stone-500 font-semibold">Paid</div>
                  <div className="display-font text-lg font-semibold text-emerald-700 mt-0.5">₹{stats.paid.toLocaleString('en-IN')}</div>
                </div>
                <div className="bg-white rounded-xl p-3 border border-stone-200">
                  <div className="text-[10px] uppercase tracking-wider text-stone-500 font-semibold">{stats.due > 0 ? 'Due' : stats.due < 0 ? 'Advance' : 'Status'}</div>
                  <div className={`display-font text-lg font-semibold mt-0.5 ${stats.due > 0 ? 'text-amber-700' : 'text-emerald-700'}`}>
                    {stats.due === 0 ? 'Cleared' : `₹${Math.abs(stats.due).toLocaleString('en-IN')}`}
                  </div>
                </div>
                <div className="bg-white rounded-xl p-3 border border-stone-200">
                  <div className="text-[10px] uppercase tracking-wider text-stone-500 font-semibold">Sessions done</div>
                  <div className="display-font text-lg font-semibold text-neutral-900 mt-0.5">{stats.billableSessions}</div>
                  {(stats.pastSessions > 0 || stats.noShowBillable > 0) && (
                    <div className="text-[10px] text-stone-500 mt-0.5">
                      {stats.sessionsCompleted} live
                      {stats.pastSessions > 0 && ` · ${stats.pastSessions} prior`}
                      {stats.noShowBillable > 0 && ` · ${stats.noShowBillable} no-show`}
                    </div>
                  )}
                </div>
              </div>

              {/* Measurements section */}
              <div>
                <div className="flex items-center justify-between mb-2">
                  <div className="text-xs uppercase tracking-wider text-stone-500 font-semibold">Body Measurements</div>
                  <button onClick={() => setShowAddMeasurement(true)} className="text-xs text-amber-700 font-bold flex items-center gap-1 active:scale-95">
                    <Icon name="Plus" size={12} /> Log entry
                  </button>
                </div>
                {latest ? (
                  <>
                    <div className="bg-gradient-to-br from-neutral-950 to-neutral-900 text-white rounded-2xl p-4 mb-2">
                      <div className="flex items-center justify-between mb-3">
                        <div className="text-[10px] uppercase tracking-wider text-amber-400 font-bold">Latest · {new Date(latest.date).toLocaleDateString('en-IN', { day: 'numeric', month: 'short', year: 'numeric' })}</div>
                        {weightDelta !== null && Math.abs(weightDelta) > 0.05 && (
                          <div className={`text-[10px] font-bold px-2 py-0.5 rounded-full ${weightDelta < 0 ? 'bg-emerald-500/20 text-emerald-300' : 'bg-amber-500/20 text-amber-300'}`}>
                            {weightDelta > 0 ? '+' : ''}{weightDelta.toFixed(1)} kg
                          </div>
                        )}
                      </div>
                      <div className="grid grid-cols-3 gap-3">
                        <div>
                          <div className="text-[10px] uppercase tracking-wider text-neutral-400 font-semibold">Weight</div>
                          <div className="display-font text-2xl font-semibold mt-0.5">{Number(latest.weight).toFixed(1)}<span className="text-sm text-neutral-400 ml-1">kg</span></div>
                        </div>
                        <div>
                          <div className="text-[10px] uppercase tracking-wider text-neutral-400 font-semibold">Height</div>
                          <div className="display-font text-2xl font-semibold mt-0.5">{Number(latest.height).toFixed(0)}<span className="text-sm text-neutral-400 ml-1">cm</span></div>
                        </div>
                        <div>
                          <div className="text-[10px] uppercase tracking-wider text-amber-400 font-bold">BMI</div>
                          <div className="display-font text-2xl font-semibold mt-0.5 text-amber-400">{calcBMI(latest.weight, latest.height)}</div>
                          <div className="text-[9px] text-neutral-400 uppercase tracking-wider">{bmiCategory(calcBMI(latest.weight, latest.height))}</div>
                        </div>
                      </div>
                      {latest.notes && <div className="mt-3 pt-3 border-t border-neutral-700 text-xs text-neutral-300 italic">"{latest.notes}"</div>}
                    </div>
                    {sortedMeasurements.length > 1 && (
                      <details className="bg-white rounded-2xl border border-stone-200 overflow-hidden">
                        <summary className="px-4 py-3 text-xs font-semibold text-stone-600 cursor-pointer flex items-center justify-between active:bg-stone-50">
                          History ({sortedMeasurements.length - 1} earlier)
                          <Icon name="ChevronDown" size={14} />
                        </summary>
                        <div className="divide-y divide-stone-100">
                          {sortedMeasurements.slice(1).map((m) => (
                            <div key={m.id} className="px-4 py-3 flex items-center justify-between text-sm">
                              <div>
                                <div className="font-medium text-neutral-900">{Number(m.weight).toFixed(1)} kg</div>
                                <div className="text-[10px] text-stone-500">{new Date(m.date).toLocaleDateString('en-IN', { day: 'numeric', month: 'short', year: 'numeric' })}</div>
                              </div>
                              <div className="flex items-center gap-3">
                                <div className="text-right">
                                  <div className="text-xs font-semibold text-amber-700">BMI {calcBMI(m.weight, m.height)}</div>
                                  <div className="text-[10px] text-stone-500">{Number(m.height).toFixed(0)} cm</div>
                                </div>
                                <button onClick={() => onDeleteMeasurement(m.id)} className="text-stone-400 active:text-red-500"><Icon name="Trash2" size={12} /></button>
                              </div>
                            </div>
                          ))}
                        </div>
                      </details>
                    )}
                  </>
                ) : (
                  <div className="bg-white rounded-2xl p-6 text-center border border-stone-200 border-dashed">
                    <Icon name="Activity" size={24} className="text-stone-400 mb-2 mx-auto" />
                    <div className="text-sm text-stone-500">No measurements logged yet</div>
                    <button onClick={() => setShowAddMeasurement(true)} className="mt-3 px-4 py-1.5 bg-neutral-950 text-white rounded-full text-xs font-semibold">Add first entry</button>
                  </div>
                )}
              </div>

              {sortedPayments.length > 0 && (
                <div>
                  <div className="text-xs uppercase tracking-wider text-stone-500 font-semibold mb-2">Payment history</div>
                  <div className="space-y-2">
                    {sortedPayments.map((p) => (
                      <div key={p.id} className="bg-white rounded-xl p-3 border border-stone-200 flex justify-between text-sm">
                        <div><div className="font-semibold text-neutral-900">₹{Number(p.amount).toLocaleString('en-IN')}</div><div className="text-xs text-stone-500">{p.method}</div></div>
                        <div className="text-xs text-stone-500">{p.date ? new Date(p.date).toLocaleDateString('en-IN') : '—'}</div>
                      </div>
                    ))}
                  </div>
                </div>
              )}
              {sortedSessions.length > 0 && (
                <div>
                  <div className="text-xs uppercase tracking-wider text-stone-500 font-semibold mb-2">Recent sessions</div>
                  <div className="space-y-2">
                    {sortedSessions.map((s) => (
                      <div key={s.id} className="bg-white rounded-xl p-3 border border-stone-200 flex justify-between items-center text-sm">
                        <div><div className="font-semibold text-neutral-900">{new Date(s.date).toLocaleDateString('en-IN', { day: 'numeric', month: 'short' })} · {s.time}</div>{s.location && <div className="text-xs text-stone-500">{s.location}</div>}</div>
                        <div className={`text-[10px] uppercase tracking-wider font-semibold px-2 py-0.5 rounded-full ${s.status === 'completed' ? 'bg-emerald-50 text-emerald-700' : s.status === 'cancelled' ? 'bg-stone-100 text-stone-500' : 'bg-amber-50 text-amber-700'}`}>{s.status || 'scheduled'}</div>
                      </div>
                    ))}
                  </div>
                </div>
              )}
            </div>
          </div>

          {showAddMeasurement && (
            <MeasurementForm
              previous={latest}
              onSave={async (data) => { await onAddMeasurement({ ...data, memberId: member.id }); setShowAddMeasurement(false); }}
              onClose={() => setShowAddMeasurement(false)}
            />
          )}
        </div>
      );
    }

    // ===== BMI helpers =====
    function calcBMI(weightKg, heightCm) {
      const w = Number(weightKg), h = Number(heightCm);
      if (!w || !h) return '—';
      const m = h / 100;
      const bmi = w / (m * m);
      return bmi.toFixed(1);
    }
    function bmiCategory(bmi) {
      const v = Number(bmi);
      if (isNaN(v)) return '';
      if (v < 18.5) return 'Underweight';
      if (v < 25) return 'Healthy';
      if (v < 30) return 'Overweight';
      return 'Obese';
    }

    // ===== Measurement Form =====
    function MeasurementForm({ previous, onSave, onClose }) {
      const [form, setForm] = useState({
        date: new Date().toISOString().split('T')[0],
        weight: '',
        height: previous?.height || '',
        notes: '',
      });
      const [saving, setSaving] = useState(false);

      const handleSubmit = async () => {
        if (!form.weight || Number(form.weight) <= 0) { alert('Weight is required'); return; }
        if (!form.height || Number(form.height) <= 0) { alert('Height is required'); return; }
        setSaving(true);
        try { await onSave(form); } catch (e) { alert('Save failed: ' + e.message); setSaving(false); }
      };

      const bmi = form.weight && form.height ? calcBMI(form.weight, form.height) : null;

      return (
        <div className="fixed inset-0 bg-black/60 z-[60] flex items-end" onClick={onClose}>
          <div className="bg-stone-50 rounded-t-3xl w-full max-h-[90vh] overflow-y-auto slide-up" onClick={(e) => e.stopPropagation()}>
            <div className="sticky top-0 bg-stone-50 px-5 pt-5 pb-3 flex items-center justify-between border-b border-stone-200">
              <h2 className="display-font text-xl font-semibold text-neutral-900">Log Measurement</h2>
              <button onClick={onClose} className="w-8 h-8 rounded-full bg-stone-200 flex items-center justify-center"><Icon name="X" size={16} /></button>
            </div>
            <div className="p-5 space-y-4">
              <Field label="Date"><input type="date" value={form.date} onChange={(e) => setForm({ ...form, date: e.target.value })} className="form-input" /></Field>
              <div className="grid grid-cols-2 gap-3">
                <Field label="Weight (kg) *"><input type="number" step="0.1" inputMode="decimal" value={form.weight} onChange={(e) => setForm({ ...form, weight: e.target.value })} className="form-input" placeholder="68.5" autoFocus /></Field>
                <Field label="Height (cm) *"><input type="number" step="0.1" inputMode="decimal" value={form.height} onChange={(e) => setForm({ ...form, height: e.target.value })} className="form-input" placeholder="170" /></Field>
              </div>
              {bmi && (
                <div className="bg-gradient-to-br from-neutral-950 to-neutral-900 text-white rounded-2xl p-4 flex items-center justify-between">
                  <div>
                    <div className="text-[10px] uppercase tracking-wider text-amber-400 font-bold">Calculated BMI</div>
                    <div className="display-font text-3xl font-semibold mt-0.5">{bmi}</div>
                  </div>
                  <div className="text-right">
                    <div className="text-xs text-neutral-300">{bmiCategory(bmi)}</div>
                  </div>
                </div>
              )}
              <Field label="Notes"><textarea value={form.notes} onChange={(e) => setForm({ ...form, notes: e.target.value })} className="form-input" rows={2} placeholder="Optional notes about this entry..." /></Field>
              <button onClick={handleSubmit} disabled={saving} className="w-full bg-neutral-950 text-white rounded-2xl py-4 font-semibold active:scale-[0.98] transition disabled:opacity-60">
                {saving ? 'Saving…' : 'Save measurement'}
              </button>
            </div>
          </div>
        </div>
      );
    }

    // ===== Boot =====
    waitForFirebase().then(() => {
      ReactDOM.createRoot(document.getElementById('root')).render(<App />);
    });
  </script>
</body>
</html>
